<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d47a1"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="1181" cy="647" r="27" fill="#1565c0" opacity="0.12"/>
    <circle cx="790" cy="49" r="63" fill="#1565c0" opacity="0.16"/>
    <circle cx="235" cy="131" r="51" fill="#1565c0" opacity="0.07"/>
    <circle cx="-52" cy="362" r="29" fill="#1565c0" opacity="0.13"/>
    <circle cx="752" cy="537" r="68" fill="#1565c0" opacity="0.16"/>
    <circle cx="403" cy="244" r="47" fill="#1565c0" opacity="0.16"/>
    <rect x="1147" y="253" width="26" height="23" rx="8" fill="#0d47a1" opacity="0.11" transform="rotate(16, -7, 36)"/>
    <rect x="1032" y="-96" width="60" height="77" rx="8" fill="#0d47a1" opacity="0.13" transform="rotate(40, -1, 627)"/>
    <rect x="682" y="562" width="20" height="21" rx="8" fill="#0d47a1" opacity="0.10" transform="rotate(2, -64, 387)"/>
    <rect x="588" y="215" width="30" height="36" rx="8" fill="#0d47a1" opacity="0.12" transform="rotate(14, 472, 704)"/>
    <rect x="364" y="298" width="62" height="43" rx="8" fill="#0d47a1" opacity="0.08" transform="rotate(11, 36, 9)"/>
    <rect x="70" y="448" width="59" height="89" rx="8" fill="#0d47a1" opacity="0.04" transform="rotate(4, 730, 204)"/>
    <rect x="535" y="320" width="50" height="35" rx="8" fill="#0d47a1" opacity="0.07" transform="rotate(30, 939, 478)"/>
    <rect x="1299" y="495" width="87" height="48" rx="8" fill="#0d47a1" opacity="0.08" transform="rotate(43, 1059, 412)"/>
    <polygon points="153,474 183,534 123,534" fill="#1565c0" opacity="0.07"/>
    <polygon points="336,585 413,739 259,739" fill="#1565c0" opacity="0.10"/>
    <polygon points="-43,-123 4,-29 -90,-29" fill="#1565c0" opacity="0.04"/>
    <polygon points="1152,413 1219,547 1085,547" fill="#1565c0" opacity="0.10"/>

  <!-- Wave at bottom -->
  <path d="M0,536 C360,583 840,489 1200,536 L1200,630 L0,630Z" fill="#1565c0" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    Ueno park 안내
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    Ueno — 정보
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#00bcd4" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#00bcd4" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    Ueno Ueno park 안내 — 정보
  </text>
</svg>