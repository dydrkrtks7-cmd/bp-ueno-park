<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="1029" cy="371" r="29" fill="#334155" opacity="0.16"/>
    <circle cx="1297" cy="485" r="62" fill="#334155" opacity="0.18"/>
    <circle cx="565" cy="664" r="76" fill="#334155" opacity="0.11"/>
    <circle cx="636" cy="366" r="51" fill="#334155" opacity="0.19"/>
    <circle cx="275" cy="404" r="61" fill="#334155" opacity="0.17"/>
    <circle cx="510" cy="162" r="74" fill="#334155" opacity="0.07"/>
    <rect x="1164" y="437" width="27" height="83" rx="8" fill="#0f172a" opacity="0.13" transform="rotate(18, 1171, -93)"/>
    <rect x="720" y="-41" width="54" height="51" rx="8" fill="#0f172a" opacity="0.05" transform="rotate(44, 384, 612)"/>
    <rect x="280" y="676" width="87" height="24" rx="8" fill="#0f172a" opacity="0.12" transform="rotate(2, 1020, -21)"/>
    <rect x="78" y="-14" width="68" height="67" rx="8" fill="#0f172a" opacity="0.15" transform="rotate(13, 1243, 627)"/>
    <rect x="791" y="93" width="56" height="46" rx="8" fill="#0f172a" opacity="0.04" transform="rotate(22, 117, -14)"/>
    <rect x="778" y="227" width="83" height="87" rx="8" fill="#0f172a" opacity="0.09" transform="rotate(15, 242, 360)"/>
    <rect x="821" y="-55" width="47" height="46" rx="8" fill="#0f172a" opacity="0.08" transform="rotate(43, 1006, 9)"/>
    <rect x="1137" y="-93" width="21" height="55" rx="8" fill="#0f172a" opacity="0.12" transform="rotate(34, 209, 512)"/>
    <polygon points="1135,-112 1215,48 1055,48" fill="#334155" opacity="0.06"/>
    <polygon points="1259,109 1342,275 1176,275" fill="#334155" opacity="0.10"/>
    <polygon points="833,394 928,584 738,584" fill="#334155" opacity="0.10"/>
    <polygon points="1287,-42 1358,100 1216,100" fill="#334155" opacity="0.05"/>

  <!-- Wave at bottom -->
  <path d="M0,550 C360,590 840,510 1200,550 L1200,630 L0,630Z" fill="#334155" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    Ueno park 안내
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    Ueno — 정보
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#6366f1" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#6366f1" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    Ueno Ueno park 안내 — 정보
  </text>
</svg>